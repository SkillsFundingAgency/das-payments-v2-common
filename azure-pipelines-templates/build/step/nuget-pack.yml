# this template depends on GitVersion being implemented earlier in the pipeline using Mainline mode
# this template should be placed at the end of a code-build stage or in a separate stage to prevent the publish task breaking the pipeline in the event that it needs to be reran

parameters:
  DotNetFrameworkPackagesToPack: ''
  DotNetStandardPackagesToPack: ''
  Major:
  Minor:
  Revision:

 
 
steps:
- task: PowerShell@2
  displayName: 'Set NuGet Package Version'
  inputs:
    targetType: inline
    script: |
      Write-Host "Major value is: ${{ parameters.Major }}"
      Write-Host "Minor value is: ${{ parameters.Minor }}"
      Write-Host "Minor value is: ${{ parameters.Revision }}"
      if ("$(GitVersion.PreReleaseLabel)" -ne "") { $NuGetPackageVersion = "${{ parameters.Major }}.${{ parameters.Minor }}.${{ parameters.Revision }}-prerelease-$(PreReleaseNumber)" } else { $NuGetPackageVersion = "${{ parameters.Major }}.${{ parameters.Minor }}.${{ parameters.Revision }}"}
      Write-Host "NuGetPackageVersion: $NuGetPackageVersion"
      Write-Host "##vso[task.setvariable variable=NuGetPackageVersion]$NuGetPackageVersion"
      

- task: DotNetCoreCLI@2
  condition: ne('${{ parameters.DotNetStandardPackagesToPack }}', '')
  displayName: 'dotnet pack'
  inputs:
    command: pack
    packagesToPack: ${{ parameters.DotNetStandardPackagesToPack }}
    versioningScheme: byEnvVar
    versionEnvVar: NuGetPackageVersion
    packDirectory: $(build.artifactstagingdirectory)/NuGetPackages

- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact: NuGetPackages'
  inputs:
    ArtifactName: NuGetPackages
    pathtoPublish: '$(build.artifactstagingdirectory)/NuGetPackages'